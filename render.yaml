services:
  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  - type: web
    name: po-converter-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: APPS_SCRIPT_URL
        sync: false
      - key: MAILER_API_KEY
        sync: false
      - key: FINANCE_EMAILS
        sync: false   # optional: comma-separated always-CC list

  # ── Frontend (Streamlit) ─────────────────────────────────────────────────────
  - type: web
    name: po-converter-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: starter
    envVars:
      - key: API_URL
        sync: false   # Set to https://po-converter-backend.onrender.com
